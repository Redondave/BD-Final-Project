<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gerenciador de Serviços da UNB</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="container">
			<h1>Gerenciador de Serviços da UNB</h1>
			<div class="card">
				<button type="button" onclick="window.location.href='/home'">Voltar para a página inicial</button>
				<h2>Agendamentos</h2>
				<form id="agendamentoForm">
					<input type="hidden" id="editingId" />
					<textarea id="local" placeholder="Local do agendamento" required></textarea>
					<input id="data" type="text" placeholder="Data do agendamento" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" required />
					<select id="idSolicitacao" required>
						<option value="">Selecione a solicitação</option>
					</select>
					<div class="actions full">
						<button type="submit">Salvar</button>
						<button type="button" id="cancelBtn" class="secondary">Cancelar</button>
					</div>
				</form>
				<div id="status" class="status"></div>
			</div>
			<div class="card">
				<table>
					<thead>
						<tr>
                            <th>Data</th>
							<th>Lugar</th>
							<th>N° da solicitação</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="agendamentosTable"></tbody>
				</table>
			</div>
		</div>
		<script src="/functions/agendamento_functions.js"></script>
	</body>
</html>
