<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gerenciador de Serviços da UNB</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="container">
			<h1>Gerenciador de Serviços da UNB</h1>
			<div class="card">
				<h2>Usuarios</h2>
				<form id="usuarioForm">
					<input type="hidden" id="editingId" />
					<input id="nome" placeholder="Nome" required />
					<input id="email" type="email" placeholder="Email" required />
					<input id="senha" type="password" placeholder="Senha" required />
					<div class="actions full">
						<button type="submit">Salvar</button>
						<button type="button" id="cancelBtn" class="secondary">Cancelar</button>
					</div>
				</form>
				<div id="status" class="status"></div>
			</div>
			<div class="card">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Nome</th>
							<th>Email</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="usuariosTable"></tbody>
				</table>
			</div>
		</div>
		<script src="/functions/user_functions.js"></script>
	</body>
</html>
