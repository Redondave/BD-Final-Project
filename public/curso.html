<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gerenciador de Serviços da UNB</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="container">
			<h1>Gerenciador de Serviços da UNB</h1>
			<div class="card">
				<button type="button" onclick="window.location.href='/home'">Voltar para a página inicial</button>
				<h2>Cursos</h2>
				<form id="cursoForm">
					<input type="hidden" id="editingId" />
					<input id="nome" placeholder="Nome" required />
					<input id="sigla" placeholder="Sigla" required />
					<div class="actions full">
						<button type="submit">Salvar</button>
						<button type="button" id="cancelBtn" class="secondary">Cancelar</button>
					</div>
				</form>
				<div id="status" class="status"></div>
			</div>
			<div class="card">
				<table>
					<thead>
						<tr>
							<th>Nome</th>
							<th>Sigla</th>
						</tr>
					</thead>
					<tbody id="cursoTable"></tbody>
				</table>
			</div>
		</div>
		<script src="/functions/curso_functions.js"></script>
	</body>
</html>
