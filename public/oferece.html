<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gerenciador de Serviços da UNB</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="container">
			<h1>Gerenciador de Serviços da UNB</h1>
			<div class="card">
				<button type="button" onclick="window.location.href='/home'">Voltar para a página inicial</button>
				<h2>Serviços por departamento</h2>
				<form id="ofertaForm">
					<input type="hidden" id="editingId" />
					<select id="idDepartamento" required>
						<option value="">Selecione o Departamento</option>
					</select>
                    <select id="idServico" required>
						<option value="">Selecione o Serviço</option>
					</select>
					<div class="actions full">
						<button type="submit">Salvar</button>
						<button type="button" id="cancelBtn" class="secondary">Cancelar</button>
					</div>
				</form>
				<div id="status" class="status"></div>
			</div>
			<div class="card">
				<table>
					<thead>
						<tr>
							<th>Nome do Departamento</th>
							<th>Nome do Serviço</th>
                            <th>Ações</th>
						</tr>
					</thead>
					<tbody id="ofertasTable"></tbody>
				</table>
			</div>
		</div>
		<script src="/functions/oferece_functions.js"></script>
	</body>
</html>
