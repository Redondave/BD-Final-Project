<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MySQL CRUD Starter</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 0;
				padding: 24px;
				background: #f5f7fb;
				color: #1f2937;
			}

			.container {
				max-width: 960px;
				margin: 0 auto;
			}

			.card {
				background: #fff;
				border-radius: 12px;
				box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
				padding: 20px;
				margin-bottom: 20px;
			}

			form {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 12px;
			}

			input, button {
				padding: 12px;
				border-radius: 8px;
				border: 1px solid #d1d5db;
				font-size: 16px;
			}

			button {
				cursor: pointer;
				background: #0f766e;
				color: white;
				border: none;
			}

			button.secondary {
				background: #475569;
			}

			table {
				width: 100%;
				border-collapse: collapse;
			}

			th, td {
				text-align: left;
				padding: 12px;
				border-bottom: 1px solid #e5e7eb;
			}

			.actions {
				display: flex;
				gap: 8px;
			}

			.full {
				grid-column: 1 / -1;
			}

			.status {
				margin-top: 12px;
				min-height: 24px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>MySQL CRUD Starter</h1>
			<div class="card">
				<h2>Usuarios</h2>
				<form id="usuarioForm">
					<input type="hidden" id="usuarioId" />
					<input id="nome" placeholder="Nome" required />
					<input id="email" type="email" placeholder="Email" required />
					<div class="actions full">
						<button type="submit">Salvar</button>
						<button type="button" id="cancelBtn" class="secondary">Cancelar</button>
					</div>
				</form>
				<div id="status" class="status"></div>
			</div>

			<div class="card">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Nome</th>
							<th>Email</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="usuariosTable"></tbody>
				</table>
			</div>
		</div>
		<script src="app.js"></script>
	</body>
</html>
